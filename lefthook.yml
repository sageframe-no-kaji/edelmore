pre-commit:
  parallel: true
  commands:
    biome:
      glob: "*.{js,ts,json}"
      # --no-errors-on-unmatched: biome ignores some matched files (e.g.
      # package-lock.json) and otherwise exits non-zero when the resolved set is
      # empty, which would wrongly block a lock-only commit.
      run: npx biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true
    # Whole-repo lint — the staged-files job above autofixes but a lint
    # error in an unstaged file must still block the commit.
    lint:
      run: npm run lint
    # The diary's `check` script (svelte-kit sync && svelte-check) needs to run
    # inside apps/diary; root delegates via --workspaces --if-present.
    svelte-check:
      run: npm run check
    # test:coverage enforces the 95%-lines floor; plain `npm run test`
    # silently skipped it.
    test:
      run: npm run test:coverage
